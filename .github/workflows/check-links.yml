name: Check Links（手動実行）

on:
  workflow_dispatch:

jobs:
  check-links:
    name: 公式URLリンクチェック
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install pyyaml

      - name: リンクチェックスクリプトの実行
        run: python scripts/check_links.py
