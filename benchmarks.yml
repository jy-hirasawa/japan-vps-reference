# benchmarks.yml
# ベンチマーク測定結果
# 不明・未測定の場合は value: "unknown" と記載してください。
# tool: 使用したベンチマークツール名
# measured_at: 測定日（YYYY-MM-DD）または "unknown"
# measured_by: 測定者またはソースURL（自己測定の場合は "self"）
# notes: 補足事項

benchmarks:
