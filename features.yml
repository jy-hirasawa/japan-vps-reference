# features.yml
# 比較に使用する機能・仕様の定義一覧
# 各機能には id, category, label, description, type を定義します。
#
# categories セクション: カテゴリの表示順と見出し名を定義します。
# features セクション: 比較項目を定義します。記載順が comparison.md の出力順に反映されます。

categories:
  - id: BASIC
    label: 基本情報
  - id: OS_TEMPLATE
    label: OS / テンプレート
  - id: PRICE
    label: 料金
  - id: SPEC
    label: CPU / メモリ
  - id: STORAGE
    label: ディスク / NVMe / スナップショット / バックアップ
  - id: NETWORK
    label: ネットワーク
  - id: SECURITY
    label: セキュリティ
  - id: BACKUP
    label: バックアップ / イメージ保存
  - id: automation
    label: API / CLI / Terraform
  - id: SUPPORT
    label: サポート / SLA
  - id: BENCH
    label: ベンチマーク

features:
  - id: root_access
    category: BASIC
    label: root権限
    description: インスタンスに対してroot権限が付与されるか。
    type: boolean

  - id: linux_support
    category: BASIC
    label: Linux対応
    description: Linuxディストリビューションのインスタンスを提供しているか。
    type: boolean

  - id: windows_official
    category: BASIC
    label: Windows公式対応
    description: Windows Serverなどのライセンス込みWindowsインスタンスを公式に提供しているか。
    type: boolean

  - id: console_vnc
    category: BASIC
    label: コンソール / VNC
    description: コントロールパネルからWebコンソール（VNC等）でインスタンスにアクセスできるか。
    type: boolean

  - id: ssh_key
    category: SECURITY
    label: SSH鍵ログイン
    description: SSHキーペアを登録・利用したログイン認証に対応しているか。
    type: boolean

  - id: startup_script
    category: BASIC
    label: スタートアップスクリプト
    description: インスタンス作成時に実行するスタートアップスクリプトを設定できるか。
    type: boolean

  - id: cloud_init
    category: BASIC
    label: cloud-init明記
    description: cloud-initへの対応が公式ドキュメントに明記されているか。
    type: boolean

  - id: standard_os_template
    category: OS_TEMPLATE
    label: 標準OSテンプレート
    description: "提供している主要な標準OSテンプレートの一覧（例: Ubuntu, CentOS, Debian 等）。不明な場合は \"unknown\"。"
    type: string

  - id: os_templates
    category: OS_TEMPLATE
    label: OSテンプレート数
    description: 選択可能なOSテンプレートの種類数。不明な場合は "unknown"。
    type: number

  - id: app_template
    category: OS_TEMPLATE
    label: アプリテンプレート
    description: WordPress等のアプリケーションが事前設定済みのテンプレートを提供しているか。
    type: boolean

  - id: kusanagi_template
    category: OS_TEMPLATE
    label: KUSANAGIテンプレート
    description: KUSANAGI（WordPress高速化エンジン）のテンプレートを提供しているか。
    type: boolean

  - id: docker_template
    category: OS_TEMPLATE
    label: Docker系テンプレート
    description: DockerまたはDocker Compose等が事前設定済みのテンプレートを提供しているか。
    type: boolean

  - id: ai_template
    category: OS_TEMPLATE
    label: AI系テンプレート
    description: "AI・機械学習関連（例: NVIDIA GPU対応イメージ、LLM実行環境等）のテンプレートを提供しているか。"
    type: boolean

  - id: custom_iso
    category: OS_TEMPLATE
    label: カスタムISO
    description: ユーザーが独自のISOイメージを使用してインスタンスを起動できるか。
    type: boolean

  - id: iso_upload
    category: OS_TEMPLATE
    label: ISOアップロード
    description: ユーザーが独自のISOイメージをアップロードできるか。
    type: boolean

  - id: min_price_jpy
    category: PRICE
    label: 最低月額料金（円）
    description: 最も安いプランの税込月額料金（円）。不明な場合は "unknown"。
    type: number

  - id: hourly_billing
    category: PRICE
    label: 時間課金
    description: 時間単位での課金に対応しているか。
    type: boolean

  - id: price_2gb_monthly
    category: PRICE
    label: 2GBプラン月額（円・税込）
    description: メモリ2GB相当プランの税込月額料金（円）。不明な場合は "unknown"、プランが存在しない場合は "-"。
    type: string

  - id: price_2gb_hourly
    category: PRICE
    label: 2GBプラン時間課金（円/時・税込）
    description: メモリ2GB相当プランの税込時間料金（円/時）。不明な場合は "unknown"、非対応の場合は "-"。
    type: string

  - id: price_4gb_monthly
    category: PRICE
    label: 4GBプラン月額（円・税込）
    description: メモリ4GB相当プランの税込月額料金（円）。不明な場合は "unknown"、プランが存在しない場合は "-"。
    type: string

  - id: price_4gb_hourly
    category: PRICE
    label: 4GBプラン時間課金（円/時・税込）
    description: メモリ4GB相当プランの税込時間料金（円/時）。不明な場合は "unknown"、非対応の場合は "-"。
    type: string

  - id: monthly_cap
    category: PRICE
    label: 月額上限（円・税込）
    description: 時間課金における月額上限料金（円）。不明な場合は "unknown"、月額上限なしまたは非対応の場合は "-"。
    type: string

  - id: initial_cost
    category: PRICE
    label: 初期費用（円・税込）
    description: 契約時の税込初期費用（円）。不明な場合は "unknown"、初期費用なしの場合は "0"。
    type: string

  - id: min_contract_period
    category: PRICE
    label: 最低利用期間
    description: 最低利用期間（例：1ヶ月、なし）。不明な場合は "unknown"。
    type: string

  - id: min_vcpu
    category: SPEC
    label: 最小vCPU数
    description: 最も安いプランのvCPU数。
    type: number

  - id: min_ram_gb
    category: SPEC
    label: 最小RAM（GB）
    description: 最も安いプランのメモリ容量（GB）。
    type: number

  - id: min_storage_gb
    category: STORAGE
    label: ディスク容量（GB）
    description: 最も安いプランのディスク容量（GB）。
    type: number

  - id: storage_type
    category: STORAGE
    label: ストレージ種別
    description: "主なストレージ種別（例: ローカルストレージ、ブロックストレージ等）。不明な場合は \"unknown\"。"
    type: string

  - id: nvme_explicit
    category: STORAGE
    label: NVMe明記
    description: NVMe対応が公式情報に明記されているか。
    type: boolean

  - id: ssd_explicit
    category: STORAGE
    label: SSD明記
    description: SSD対応が公式情報に明記されているか。
    type: boolean

  - id: additional_disk
    category: STORAGE
    label: ディスク追加
    description: 追加ディスクをアタッチできるか。
    type: boolean

  - id: disk_expansion
    category: STORAGE
    label: ディスク拡張
    description: 既存ディスク容量を拡張できるか。
    type: boolean

  - id: full_disk_snapshot
    category: STORAGE
    label: スナップショット
    description: ディスク全体のスナップショット取得に対応しているか。
    type: boolean

  - id: auto_snapshot
    category: STORAGE
    label: 自動スナップショット
    description: スケジュール設定などにより自動でスナップショットを取得できるか。
    type: boolean

  - id: backup_feature
    category: STORAGE
    label: バックアップ機能
    description: バックアップ機能が公式に提供されているか。
    type: boolean

  - id: custom_image_save
    category: STORAGE
    label: イメージ保存
    description: 作成済みインスタンスやディスクからカスタムイメージを保存できるか。
    type: boolean

  - id: object_storage_integration
    category: STORAGE
    label: オブジェクトストレージ連携
    description: オブジェクトストレージと連携した利用方法が公式に提供されているか。
    type: boolean

  - id: ipv4
    category: NETWORK
    label: IPv4
    description: グローバルIPv4アドレスの提供形態。不明な場合は "unknown"。
    type: string

  - id: ipv6_support
    category: NETWORK
    label: IPv6
    description: IPv6アドレスの割り当てに対応しているか。
    type: boolean

  - id: additional_ipv4
    category: NETWORK
    label: 追加IPv4
    description: 追加のグローバルIPv4アドレスをオプション等で利用できるか。
    type: boolean

  - id: reverse_dns
    category: NETWORK
    label: 逆引きDNS
    description: 逆引きDNS（PTRレコード）の設定に対応しているか。
    type: boolean

  - id: traffic_limit
    category: NETWORK
    label: 転送量制限
    description: 月間転送量などの制限。不明な場合は "unknown"。
    type: string

  - id: bandwidth_gbps
    category: NETWORK
    label: 帯域目安（Gbps）
    description: 公式情報で明記されている帯域目安（Gbps）。不明な場合は "unknown"。
    type: number

  - id: local_network
    category: NETWORK
    label: ローカルネットワーク
    description: 同一サービス内でインスタンス間のローカルネットワークを利用できるか。
    type: boolean

  - id: private_network
    category: NETWORK
    label: プライベートネットワーク
    description: 分離されたプライベートネットワークを利用できるか。
    type: boolean

  - id: vlan
    category: NETWORK
    label: VLAN
    description: VLAN機能または同等のネットワーク分離機能を利用できるか。
    type: boolean

  - id: load_balancer
    category: NETWORK
    label: ロードバランサー
    description: ロードバランサー機能またはマネージドLBサービスを利用できるか。
    type: boolean

  - id: floating_ip
    category: NETWORK
    label: Floating IP
    description: インスタンス間で付け替え可能な固定グローバルIPを利用できるか。
    type: boolean

  - id: firewall_feature
    category: SECURITY
    label: ファイアウォール機能
    description: ネットワーク単位またはインスタンス単位のファイアウォール機能を利用できるか。
    type: boolean

  - id: ddos_protection
    category: SECURITY
    label: DDoS保護
    description: DDoS緩和機能が標準で提供されているか。不明な場合は "unknown"。
    type: string

  - id: waf_feature
    category: SECURITY
    label: WAF
    description: WAF（Web Application Firewall）を利用できるか。
    type: boolean

  - id: security_group
    category: SECURITY
    label: セキュリティグループ
    description: セキュリティグループ相当のルールベース通信制御を利用できるか。
    type: boolean

  - id: admin_console_2fa
    category: SECURITY
    label: 二要素認証（管理画面）
    description: 管理画面ログインで二要素認証（2FA）を設定できるか。
    type: boolean

  - id: api_token
    category: SECURITY
    label: APIトークン
    description: APIトークンを発行・管理して認証に利用できるか。
    type: boolean

  - id: iam_rbac
    category: SECURITY
    label: IAM / 権限管理
    description: IAMまたはロールベースの権限管理を利用できるか。
    type: boolean

  - id: audit_log
    category: SECURITY
    label: 監査ログ
    description: 操作履歴などの監査ログを確認できるか。
    type: boolean

  - id: iso27001
    category: SECURITY
    label: ISO27001
    description: ISO/IEC 27001 の認証取得状況。不明な場合は "unknown"。
    type: string

  - id: isms
    category: SECURITY
    label: ISMS
    description: ISMS認証の取得状況。不明な場合は "unknown"。
    type: string

  - id: soc2
    category: SECURITY
    label: SOC 2
    description: SOC 2 の監査報告・適合状況。不明な場合は "unknown"。
    type: string

  - id: pci_dss
    category: SECURITY
    label: PCI DSS
    description: PCI DSS の準拠・認証状況。不明な場合は "unknown"。
    type: string

  - id: datacenter_certification
    category: SECURITY
    label: データセンター認証
    description: "利用データセンターの第三者認証（例: ISO27001 等）。不明な場合は \"unknown\"。"
    type: string

  - id: api_available
    category: automation
    label: REST API
    description: プロビジョニング・管理用のREST APIが提供されているか。
    type: boolean

  - id: openapi_published
    category: automation
    label: OpenAPI公開
    description: OpenAPI（Swagger）仕様が公式に公開されているか。
    type: boolean

  - id: cli_available
    category: automation
    label: CLI
    description: 公式CLIツールが提供されているか。
    type: boolean

  - id: terraform_provider
    category: automation
    label: Terraform Provider
    description: Terraform Provider が提供されているか。
    type: boolean

  - id: pulumi_support
    category: automation
    label: Pulumi対応
    description: Pulumi での利用方法や公式対応が提供されているか。
    type: boolean

  - id: ansible_support
    category: automation
    label: Ansible対応
    description: Ansibleで利用できる公式情報やモジュールが提供されているか。
    type: boolean

  - id: metadata_service
    category: automation
    label: メタデータサービス
    description: インスタンスメタデータサービスが提供されているか。
    type: boolean

  - id: api_rate_limit_published
    category: automation
    label: APIレート制限公開
    description: APIレート制限の仕様が公式に公開されているか。
    type: boolean

  - id: webhook
    category: automation
    label: Webhook
    description: Webhook通知機能が提供されているか。
    type: boolean

  - id: sdk_go
    category: automation
    label: SDK（Go）
    description: Go向けの公式SDKが提供されているか。
    type: boolean

  - id: sdk_python
    category: automation
    label: SDK（Python）
    description: Python向けの公式SDKが提供されているか。
    type: boolean

  - id: sdk_nodejs
    category: automation
    label: SDK（Node.js）
    description: Node.js向けの公式SDKが提供されているか。
    type: boolean

  - id: sla_uptime_percent
    category: SUPPORT
    label: SLA稼働率（%）
    description: 公式SLAに記載された稼働率保証（%）。不明な場合は "unknown"。
    type: number
