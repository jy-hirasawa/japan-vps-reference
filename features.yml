# features.yml
# 比較に使用する機能・仕様の定義一覧
# 各機能には id, category, label, description, type を定義します。
#
# categories セクション: カテゴリの表示順と見出し名を定義します。
# features セクション: 比較項目を定義します。記載順が comparison.md の出力順に反映されます。

categories:
  - id: BASIC
    label: 基本情報
  - id: OS_TEMPLATE
    label: OS / テンプレート
  - id: PRICE
    label: 料金
  - id: SPEC
    label: CPU / メモリ / ストレージ
  - id: STORAGE
    label: ディスク / NVMe / スナップショット
  - id: NETWORK
    label: IPv4 / IPv6 / 転送量 / ローカルネットワーク
  - id: SECURITY
    label: Firewall / WAF / DDoS
  - id: BACKUP
    label: バックアップ / イメージ保存
  - id: OPS
    label: API / CLI / Terraform
  - id: SUPPORT
    label: サポート / SLA
  - id: BENCH
    label: ベンチマーク

features:
  - id: root_access
    category: BASIC
    label: root権限
    description: インスタンスに対してroot権限が付与されるか。
    type: boolean

  - id: linux_support
    category: BASIC
    label: Linux対応
    description: Linuxディストリビューションのインスタンスを提供しているか。
    type: boolean

  - id: windows_official
    category: BASIC
    label: Windows公式対応
    description: Windows Serverなどのライセンス込みWindowsインスタンスを公式に提供しているか。
    type: boolean

  - id: console_vnc
    category: BASIC
    label: コンソール / VNC
    description: コントロールパネルからWebコンソール（VNC等）でインスタンスにアクセスできるか。
    type: boolean

  - id: ssh_key
    category: BASIC
    label: SSH鍵認証
    description: SSHキーペアを登録・利用した認証に対応しているか。
    type: boolean

  - id: startup_script
    category: BASIC
    label: スタートアップスクリプト
    description: インスタンス作成時に実行するスタートアップスクリプトを設定できるか。
    type: boolean

  - id: cloud_init
    category: BASIC
    label: cloud-init明記
    description: cloud-initへの対応が公式ドキュメントに明記されているか。
    type: boolean

  - id: standard_os_template
    category: OS_TEMPLATE
    label: 標準OSテンプレート
    description: "提供している主要な標準OSテンプレートの一覧（例: Ubuntu, CentOS, Debian 等）。不明な場合は \"unknown\"。"
    type: string

  - id: os_templates
    category: OS_TEMPLATE
    label: OSテンプレート数
    description: 選択可能なOSテンプレートの種類数。不明な場合は "unknown"。
    type: number

  - id: app_template
    category: OS_TEMPLATE
    label: アプリテンプレート
    description: WordPress等のアプリケーションが事前設定済みのテンプレートを提供しているか。
    type: boolean

  - id: kusanagi_template
    category: OS_TEMPLATE
    label: KUSANAGIテンプレート
    description: KUSANAGI（WordPress高速化エンジン）のテンプレートを提供しているか。
    type: boolean

  - id: docker_template
    category: OS_TEMPLATE
    label: Docker系テンプレート
    description: DockerまたはDocker Compose等が事前設定済みのテンプレートを提供しているか。
    type: boolean

  - id: ai_template
    category: OS_TEMPLATE
    label: AI系テンプレート
    description: "AI・機械学習関連（例: NVIDIA GPU対応イメージ、LLM実行環境等）のテンプレートを提供しているか。"
    type: boolean

  - id: custom_iso
    category: OS_TEMPLATE
    label: カスタムISO
    description: ユーザーが独自のISOイメージを使用してインスタンスを起動できるか。
    type: boolean

  - id: iso_upload
    category: OS_TEMPLATE
    label: ISOアップロード
    description: ユーザーが独自のISOイメージをアップロードできるか。
    type: boolean

  - id: min_price_jpy
    category: PRICE
    label: 最低月額料金（円）
    description: 最も安いプランの税込月額料金（円）。不明な場合は "unknown"。
    type: number

  - id: hourly_billing
    category: PRICE
    label: 時間課金
    description: 時間単位での課金に対応しているか。
    type: boolean

  - id: price_2gb_monthly
    category: PRICE
    label: 2GBプラン月額（円・税込）
    description: メモリ2GB相当プランの税込月額料金（円）。不明な場合は "unknown"、プランが存在しない場合は "-"。
    type: string

  - id: price_2gb_hourly
    category: PRICE
    label: 2GBプラン時間課金（円/時・税込）
    description: メモリ2GB相当プランの税込時間料金（円/時）。不明な場合は "unknown"、非対応の場合は "-"。
    type: string

  - id: price_4gb_monthly
    category: PRICE
    label: 4GBプラン月額（円・税込）
    description: メモリ4GB相当プランの税込月額料金（円）。不明な場合は "unknown"、プランが存在しない場合は "-"。
    type: string

  - id: price_4gb_hourly
    category: PRICE
    label: 4GBプラン時間課金（円/時・税込）
    description: メモリ4GB相当プランの税込時間料金（円/時）。不明な場合は "unknown"、非対応の場合は "-"。
    type: string

  - id: monthly_cap
    category: PRICE
    label: 月額上限（円・税込）
    description: 時間課金における月額上限料金（円）。不明な場合は "unknown"、月額上限なしまたは非対応の場合は "-"。
    type: string

  - id: initial_cost
    category: PRICE
    label: 初期費用（円・税込）
    description: 契約時の税込初期費用（円）。不明な場合は "unknown"、初期費用なしの場合は "0"。
    type: string

  - id: min_contract_period
    category: PRICE
    label: 最低利用期間
    description: 最低利用期間（例：1ヶ月、なし）。不明な場合は "unknown"。
    type: string

  - id: min_vcpu
    category: SPEC
    label: 最小vCPU数
    description: 最も安いプランのvCPU数。
    type: number

  - id: min_ram_gb
    category: SPEC
    label: 最小RAM（GB）
    description: 最も安いプランのメモリ容量（GB）。
    type: number

  - id: min_storage_gb
    category: SPEC
    label: 最小ストレージ（GB）
    description: 最も安いプランのSSDストレージ容量（GB）。
    type: number

  - id: full_disk_snapshot
    category: STORAGE
    label: ディスクスナップショット
    description: ディスク全体のスナップショット取得に対応しているか。
    type: boolean

  - id: bandwidth_gbps
    category: NETWORK
    label: 帯域幅（Gbps）
    description: 提供される上り帯域幅の最大値（Gbps）。不明な場合は "unknown"。
    type: number

  - id: ipv6_support
    category: NETWORK
    label: IPv6対応
    description: IPv6アドレスの割り当てに対応しているか。
    type: boolean

  - id: ddos_protection
    category: SECURITY
    label: DDoS保護
    description: DDoS緩和機能が標準で提供されているか。不明な場合は "unknown"。
    type: string

  - id: api_available
    category: OPS
    label: API提供
    description: プロビジョニング・管理用のAPIが提供されているか。
    type: boolean

  - id: sla_uptime_percent
    category: SUPPORT
    label: SLA稼働率（%）
    description: 公式SLAに記載された稼働率保証（%）。不明な場合は "unknown"。
    type: number
